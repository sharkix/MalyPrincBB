name: Archive Maly Princ

on:
  schedule:
    - cron: "10 22,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-maly-princ
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check local midnight in Bratislava
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "archive_date=$(TZ=Europe/Bratislava date +%F)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCAL_HOUR="$(TZ=Europe/Bratislava date +%H)"
          if [ "$LOCAL_HOUR" != "00" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "archive_date=$(TZ=Europe/Bratislava date +%F)" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh archive
        if: steps.gate.outputs.run == 'true'
        run: python3 scripts/archive.py --date "${{ steps.gate.outputs.archive_date }}"

      - name: Commit changes
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "archive: ${{ steps.gate.outputs.archive_date }}"
          git push
